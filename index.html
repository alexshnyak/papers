<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers — Натуральные лимонады в экологичной упаковке</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-matcha: #a6ba4c; 
            --color-gelato: #eaa3a2;
            --color-blush: #f2d9db;
            --color-bg-hero: #f4f3ee; 
            --text-dark: #1a1a1a;
            --text-light: #fbfbfa;
            --border-overlay: rgba(26, 26, 26, 0.08);
            --border-light: rgba(251, 251, 250, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #fbfbfa;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid var(--border-overlay);
            background: rgba(253, 251, 247, 0.85);
            backdrop-filter: blur(20px);
            transition: padding 0.3s ease;
        }

        .logo {
            font-size: clamp(28px, 3vw, 34px);
            font-weight: 800;
            letter-spacing: -1.5px;
            text-transform: lowercase;
            font-style: italic;
            text-decoration: none;
            color: var(--text-dark);
        }

        nav {
            display: flex;
            gap: clamp(15px, 2.5vw, 35px);
        }

        nav a {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.6;
        }

        .header-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-overlay);
            white-space: nowrap;
        }

        /* --- ГЛАВНЫЙ ЭКРАН С АДАПТИВОМ ПОД НОУТЫ И МОБИЛКИ --- */
        .hero-section {
            min-height: 100vh;
            background-color: var(--color-bg-hero);
            padding: 140px 8% 60px 8%;
            display: flex;
            align-items: center;
            position: relative;
            border-bottom: 1px solid var(--border-overlay);
        }

        .hero-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            width: 100%;
            align-items: center;
            gap: 40px;
        }

        .hero-badge-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--text-dark);
            padding-bottom: 4px;
        }

        /* Умный размер шрифта для заголовка */
        .hero-section h1 {
            font-size: clamp(34px, 4.5vw, 64px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 25px;
        }

        .hero-section h1 span {
            font-weight: 300;
            font-style: italic;
        }

        /* Управление переносом строки */
        .desktop-only {
            display: inline;
        }

        .hero-desc {
            font-size: clamp(15px, 1.2vw, 17px);
            line-height: 1.6;
            color: #444;
            max-width: 540px;
            margin-bottom: 35px;
        }

        .hero-features {
            display: flex;
            gap: clamp(15px, 2vw, 30px);
            margin-bottom: 35px;
        }

        .hero-feat-item {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
        }

        .hero-feat-item span {
            display: block;
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 300;
            color: #888;
            margin-bottom: 3px;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-black, .btn-outline {
            padding: 16px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-black {
            background: var(--text-dark);
            color: #ffffff;
            border: 1px solid var(--text-dark);
        }
        .btn-black:hover { opacity: 0.9; }

        .btn-outline {
            border: 1px solid var(--text-dark);
            color: var(--text-dark);
        }
        .btn-outline:hover { background: rgba(0,0,0,0.03); }

        .hero-visual {
            position: relative;
            height: clamp(350px, 40vw, 550px);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .cans-composite {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .can-composite-img {
            position: absolute;
            height: 80%;
            width: auto;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0px 20px 40px rgba(0,0,0,0.12));
        }

        /* Позиционирование банок для эффекта разворота журнала */
        .can-matcha-hero { z-index: 3; bottom: 10%; left: 30%; transform: rotate(-4deg); }
        .can-grape-hero { z-index: 2; bottom: 16%; left: 10%; transform: rotate(-15deg) scale(0.95); opacity: 0.9; }
        .can-pear-hero { z-index: 1; bottom: 13%; right: 15%; transform: rotate(12deg) scale(0.9); opacity: 0.85; }

        /* Ховер-эффект на десктопах */
        @media (hover: hover) {
            .hero-visual:hover .can-grape-hero { transform: translate(-25px, -10px) rotate(-18deg) scale(0.95); }
            .hero-visual:hover .can-pear-hero { transform: translate(25px, -10px) rotate(16deg) scale(0.9); }
        }

        /* --- СЕКЦИИ ВКУСОВ --- */
        .section-flavor {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 8% 60px 8%;
            position: relative;
            border-bottom: 1px solid var(--border-overlay);
        }

        #matcha { background-color: var(--color-matcha); color: var(--text-light); }
        #matcha .flavor-points li { color: #e2ebd0; }
        #matcha .icon-item { background: rgba(251, 251, 250, 0.15); color: var(--text-light); border-color: transparent; }

        #grape { background-color: var(--color-blush); color: var(--text-dark); }
        #grape .icon-item { background: #ffffff; color: var(--text-dark); }

        #pear { background-color: #f5f4ef; color: var(--text-dark); }
        #pear .icon-item { background: #ffffff; color: var(--text-dark); }

        .container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            width: 100%;
            align-items: center;
            gap: 50px;
            position: relative;
            z-index: 2;
        }

        .flavor-text h1 {
            font-size: clamp(32px, 4vw, 56px);
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
        }

        .flavor-desc {
            font-size: clamp(15px, 1.1vw, 17px);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 540px;
            opacity: 0.9;
        }

        .flavor-points {
            list-style: none;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .flavor-points li {
            font-size: 15px;
            font-weight: 600;
            padding-left: 20px;
            position: relative;
        }

        .flavor-points li::before {
            content: "—";
            position: absolute;
            left: 0;
            opacity: 0.7;
        }

        .flavor-icons {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .icon-item {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 1px solid var(--border-overlay);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
        }

        .can-wrapper {
            height: clamp(320px, 35vw, 480px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .can-img {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 20px 40px rgba(0,0,0,0.1));
        }

        .cta-btn {
            display: inline-block;
            padding: 16px 36px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }
        #matcha .cta-btn { background: var(--text-light); color: var(--text-dark); }
        #grape .cta-btn { background: var(--color-gelato); color: white; }
        #pear .cta-btn { background: var(--color-matcha); color: white; }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        /* БЕГУЩАЯ СТРОКА */
        .marquee {
            background: var(--text-dark);
            color: #fbfbfa;
            padding: 20px 0;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
        }

        .marquee-track {
            display: inline-block;
            animation: marquee 25s linear infinite;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .marquee-track span { margin-right: 60px; }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        /* СЕТКА МАГАЗИНОВ */
        .shop-section {
            padding: 80px 8%;
            background-color: var(--color-blush);
            border-bottom: 1px solid var(--border-overlay);
        }

        .section-title {
            font-size: clamp(28px, 3.5vw, 42px);
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: -1.5px;
        }

        .section-subtitle {
            font-size: 14px;
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 50px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .shop-card {
            background: #ffffff;
            border: 1px solid var(--border-overlay);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 230px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.04);
        }

        .shop-type {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #888;
            margin-bottom: 10px;
        }

        .shop-card h3 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .shop-card p {
            font-size: 13.5px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .shop-link {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
        }

        /* ТЕХНИЧЕСКАЯ ТАБЛИЦА */
        .tech-section {
            padding: 80px 8%;
            background-color: var(--color-matcha);
            color: var(--text-light);
        }

        .tech-section .section-subtitle { color: #e2ebd0; }

        .table-container {
            width: 100%;
            overflow-x: auto; /* Скролл для совсем маленьких экранов */
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .tech-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            color: var(--text-dark);
            min-width: 600px;
        }

        .tech-table th, .tech-table td {
            padding: 18px 22px;
            text-align: left;
            border-bottom: 1px solid var(--border-overlay);
            font-size: 14px;
        }

        .tech-table th {
            background: #f6f5f1;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            color: #666;
        }

        footer {
            background: #111111;
            color: #888888;
            padding: 40px 8% 30px 8%;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            border-top: 1px solid #222;
        }

        footer .social-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 15px;
        }

        footer .social-icon-img {
            height: 20px;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        footer .social-link-item:hover .social-icon-img { opacity: 1; }

        /* --- МЕДИА-ЗАПРОСЫ (АДАПТИВНОСТЬ ПОД В СЕ УСТРОЙСТВА) --- */
        
        /* Планшеты и мелкие ноутбуки */
        @media (max-width: 1100px) {
            header { padding: 15px 4%; }
            .hero-section, .section-flavor, .shop-section, .tech-section { padding-left: 4%; padding-right: 4%; }
        }

        /* Переход в мобильное состояние */
        @media (max-width: 968px) {
            header { 
                position: absolute; 
                flex-direction: column; 
                gap: 12px; 
                padding: 15px 20px;
                background: #fbfbfa;
            }
            .header-right { display: none; } /* Скрываем плашку ради места */
            nav { flex-wrap: wrap; justify-content: center; gap
